            --glass-border: rgba(179, 93, 68, 0.3);

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%; width: 100%;
            background-color: var(--grey-dark);
            font-family: 'Urbanist', sans-serif;
            color: var(--white);
            overflow: hidden;
            user-select: none;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--grey-dark);
            z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease, visibility 1s;
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; }

        .enter-btn {
            background: transparent; border: 1px solid var(--terracotta);
            color: var(--terracotta); padding: 15px 40px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 5px; font-size: 14px;
            transition: 0.4s; margin-top: 30px;
        }
        .enter-btn:hover { background: var(--terracotta); color: white; box-shadow: 0 0 30px rgba(179,93,68,0.4); }

        /* --- UI OVERLAYS --- */
        #top-ui {
            position: fixed; top: 25px; left: 8vw; right: 8vw;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            display: none; /* Hidden until start */
        }

        #musicStatus {
            background: rgba(18, 18, 19, 0.8); border: 1px solid var(--terracotta);
            color: var(--terracotta); padding: 8px 20px; border-radius: 30px;
            font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
            display: flex; align-items: center; gap: 12px;
        }
        .v-bar { width: 3px; background: var(--terracotta); animation: pulse 1.2s infinite ease-in-out; height: 15px; }
        @keyframes pulse { 0%, 100% { height: 5px; } 50% { height: 15px; } }

        .lang-toggle {
            display: flex; gap: 10px;
        }
        .lang-btn {
            background: transparent; border: 1px solid var(--terracotta);
            color: var(--terracotta); padding: 5px 12px; cursor: pointer;
            font-size: 11px; font-weight: 600; transition: 0.3s;
        }
        .lang-btn.active { background: var(--terracotta); color: white; }

        /* --- MAIN DECK --- */
        #main-deck { width: 100vw; height: 100vh; position: relative; }

        .slide {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            padding: 5vh 8vw;
            opacity: 0; visibility: hidden;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
        }

        .slide.active { opacity: 1; visibility: visible; }

        .slide::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(18,18,19,0.55) 0%, rgba(18,18,19,0.95) 100%);
            z-index: 1;
        }

        .slide-content { position: relative; z-index: 5; max-height: 90vh; overflow-y: auto; scrollbar-width: none; }
        .slide-content::-webkit-scrollbar { display: none; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }

        .glass-card {
            background: rgba(28, 28, 30, 0.95);
            border: 1px solid var(--glass-border);
            padding: 25px;
            backdrop-filter: blur(10px);
        }

            font-family: 'Playfair Display', serif;

            color: var(--terracotta);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--terracotta);
            display: inline-block;
            padding-bottom: 5px;
        }

        td { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); vertical-align: top; }
        .item-name { font-weight: 600; font-size: 1.05em; display: block; color: var(--white); }
        .item-desc { font-size: 0.85em; color: var(--text-dim); font-style: italic; display: block; margin-top: 5px; font-weight: 300; line-height: 1.4; }
        .price { color: var(--terracotta); font-weight: 700; text-align: right; min-width: 90px; font-size: 1.1em; }
        .ml { font-size: 0.75em; color: var(--terracotta); text-transform: lowercase; margin-left: 6px; }

            position: absolute; bottom: 40px; left: 8vw; right: 8vw;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            display: none;

            text-transform: uppercase; letter-spacing: 3px; font-size: 11px;
            transition: 0.3s;

        .nav-btn:hover { background: var(--terracotta); color: var(--white); }

        .slide-counter {
            font-family: 'Playfair Display', serif; color: var(--terracotta);
            font-size: 18px; letter-spacing: 5px; font-weight: 700;

    let lang = 'ro';
    let current = 1;
    const totalSlides = 18;
    let ytPlayer;

    // --- RENDER ENGINE ---
    function renderSlides() {
        const deck = document.getElementById('main-deck');
        deck.innerHTML = '';
        deckData[lang].slides.forEach(s => {
            const div = document.createElement('div');
            div.className = `slide ${s.bg} ${s.id === current ? 'active' : ''}`;
            div.id = `s${s.id}`;
            
            let content = '';
            if (s.type === 'intro') {
                content = `
                    <div class="slide-content" style="text-align: center;">
                        <div style="width: 140px; height: 140px; background: #fff; border-radius: 50%; margin: 0 auto 30px; border: 4px solid var(--terracotta); overflow: hidden; display: flex; align-items: center; justify-content: center;">
                            <img src="IMG_0060.JPEG" alt="logo" style="width: 90%; border-radius: 50%;">
                        </div>
                        ${s.promo ? `<div class="promo-box">${s.promo}</div>` : ''}
                        <h1>${s.title}</h1>
                        <p style="font-family: 'Playfair Display'; font-size: 30px; font-style: italic; color: #fff;">${s.sub || ''}</p>
                        <div style="margin-top: 40px; letter-spacing: 8px; text-transform: uppercase; font-size: 13px; color: var(--terracotta); border: 1px solid var(--terracotta); padding: 15px 35px; display: inline-block;">
                            ${s.info}
                        </div>
                    </div>
                `;
            } else if (s.type === 'story') {
                content = `
                    <div class="slide-content">
                        <div class="promo-box">${s.promo}</div>
                        <h2 class="section-title">${s.title}</h2>
                        <p class="story-block">${s.body}</p>
                    </div>
                `;
            } else if (s.type === 'menu') {
                content = `
                    <div class="slide-content">
                        <h2 class="section-title">${s.title}</h2>
                        <div class="grid-2">
                            ${s.grids.map(g => `
                                <div class="glass-card">
                                    <div class="category-label">${g.label}</div>
                                    <table>
                                        ${g.items.map(i => `
                                            <tr>
                                                <td><span class="item-name">${i.name} ${i.ml ? `<span class="ml">${i.ml}</span>` : ''}</span><span class="item-desc">${i.desc || ''}</span></td>
                                                <td class="price">${i.price}</td>
                                            </tr>
                                        `).join('')}
                                    </table>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            div.innerHTML = content;
            deck.appendChild(div);
        });
        
        // Update UI Text
        document.getElementById('ui-prev').innerText = deckData[lang].ui.prev;
        document.getElementById('ui-next').innerText = deckData[lang].ui.next;
        document.getElementById('ui-music-tag').innerText = deckData[lang].ui.music;
    }

    // --- LOGIC ---
    function setLang(l) {
        lang = l;
        document.getElementById('btn-ro').classList.toggle('active', l === 'ro');
        document.getElementById('btn-en').classList.toggle('active', l === 'en');
        renderSlides();
    }

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', {
            height: '0', width: '0',
            videoId: 'L5as_Wun-R0', // Reliable Coffee Shop Jazz Loop
            playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'L5as_Wun-R0' }
        });
    }

    function startExperience(l) {
        lang = l;
        setLang(l);
        document.getElementById('splash-screen').classList.add('hidden');
        document.getElementById('top-ui').style.display = 'flex';
        document.getElementById('nav-ui').style.display = 'flex';
        if (ytPlayer && ytPlayer.playVideo) ytPlayer.playVideo();
        updateDeck();
    }

    function updateDeck() {
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
        const active = document.getElementById('s' + current);
        if (active) active.classList.add('active');
        
        document.getElementById('progressLine').style.width = ((current - 1) / (totalSlides - 1) * 100) + '%';
        document.getElementById('counter').innerText = (current < 10 ? '0' : '') + current + ' / ' + totalSlides;
    }

    function next() { if (current < totalSlides) current++; else current = 1; updateDeck(); }
    function prev() { if (current > 1) current--; else current = totalSlides; updateDeck(); }

    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === ' ') next();
        if (e.key === 'ArrowLeft') prev();
    });

    let scrollTimeout;
    window.addEventListener('wheel', e => {
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
            if (Math.abs(e.deltaY) > 50) { if (e.deltaY > 0) next(); else prev(); }
        }, 80);
    }, { passive: true });

    renderSlides();
</script>
